default_language_version:
  python: python3.13
repos:
  - repo: local
    hooks:
      - id: check-added-large-files
        name: check-added-large-files
        entry: poetry run check-added-large-files
        language: system
      - id: check-merge-conflict
        name: check-merge-conflict
        entry: poetry run check-merge-conflict
        language: system
        types: [text]
      - id: check-case-conflict
        name: check-case-conflict
        entry: poetry run check-case-conflict
        language: system
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: poetry run end-of-file-fixer
        language: system
        types: [text]
      - id: trailing-whitespace
        name: trailing-whitespace
        entry: poetry run trailing-whitespace-fixer
        language: system
        types: [text]
      - id: mixed-line-ending
        name: mixed-line-ending
        entry: poetry run mixed-line-ending
        language: system
        types: [text]
      - id: check-yaml
        name: check-yaml
        entry: poetry run check-yaml
        language: system
        types: [yaml]
      - id: check-json
        name: check-json
        entry: poetry run check-json
        language: system
        types: [json]
      - id: check-toml
        name: check-toml
        entry: poetry run check-toml
        language: system
        types: [toml]
      - id: check-ast
        name: check-ast
        entry: poetry run check-ast
        language: system
        types: [python]

  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: poetry run isort
        language: system
        types: [text]
      - id: pydoclint
        name: pydoclint
        entry: poetry run pydoclint
        language: system
        types: [python]
      - id: ruff
        name: ruff
        entry: poetry run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, jupyter]
        require_serial: true
      - id: black
        name: black
        entry: poetry run black
        language: system
        types_or: [python, jupyter]
        require_serial: true
