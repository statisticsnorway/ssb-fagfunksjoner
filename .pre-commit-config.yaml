default_language_version:
  python: python3.13
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: end-of-file-fixer
        types: [text]
      - id: trailing-whitespace
        types: [text]
      - id: mixed-line-ending
        types: [text]
      - id: check-yaml
      - id: check-json
      - id: check-toml
      - id: check-ast

  - repo: local
    hooks:
      - id: isort
        name: isort
        entry: poetry run isort
        language: system
        types: [text]
      - id: pydoclint
        name: pydoclint
        entry: poetry run pydoclint
        language: system
        types: [python]
      - id: ruff
        name: ruff
        entry: poetry run ruff check --fix --exit-non-zero-on-fix
        language: system
        types_or: [python, jupyter]
        require_serial: true
      - id: black
        name: black
        entry: poetry run black
        language: system
        types_or: [python, jupyter]
        require_serial: true
